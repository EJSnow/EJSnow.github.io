<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, inital-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/css/favicon.png">
    <style>@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap');</style>
    <style>h1 {margin-top: 0}</style>
  </head>
  <body>
    <div class="window glass active content" id="main">
      <div class="title-bar">
        <div class="title-bar-text">EJSnow</div>
        <div class="title-bar-controls">
          <!-- These are decorative and don't actually do anything -->
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      <div class="window-body has-space">
        <menu role="tablist" aria-label="Tabs">
          <button role="tab" aria-controls="home" aria-selected="true">Home</button>
          <button role="tab" aria-controls="about-me">About me</button>
          <button role="tab" aria-controls="blog">Blog</button>
          <button role="tab" aria-controls="resources">Resources</button>
        </menu>
        {{ content }}
      </div>
      <div id="modal">
        <span id="close-button" onclick="closeModal();">&times;</span>
        <figure id="modal-img">
          <img src="">
          <figcaption></figcaption>
        </figure>
      </div>
      <footer>
        Me, but elsewhere:
        <a href="https://github.com/ejsnow">GitHub</a>
        <a href="https://www.youtube.com/@EJSnow-m1s">Youtube</a>
      </footer>
    </div>
    <script src="/js/script.js"></script>
  </body>
</html>
